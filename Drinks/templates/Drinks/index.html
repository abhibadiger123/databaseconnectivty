<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Drinks App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #74ebd5, #acb6e5);
        text-align: center;
        margin: 0;
        padding: 0;
      }

      .container {
        margin-top: 60px;
        background: white;
        padding: 30px;
        display: inline-block;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        width: 350px;
      }

      h1 {
        color: #333;
      }

      p {
        color: #555;
      }

      img {
        width: 250px;
        height: 250px;
        border-radius: 12px;
        margin-top: 15px;
        object-fit: cover;
      }

      .btn {
        margin-top: 15px;
        padding: 10px 20px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .btn:hover {
        background-color: #45a049;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🍹 Drinks App</h1>
      <p>Welcome! Explore refreshing drinks below.</p>

      <!-- Drinks Image -->
      <img
        src="https://images.unsplash.com/photo-1551024709-8f23befc6f87"
        alt="Drinks Image"
      />

      <br />
      <button class="btn">Explore Drinks</button>
    </div>
  </body>
</html>
